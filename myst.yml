  #     affiliations:
  #       - National University of Colombia
  copyright: '2026'
  keywords:
    - Blog
    - Machine Learning
    - Artificial Intelligence
    - Artificial Neural Networks
    - Bioinspired Algorithms
  github: opengeos/myst-blog-template
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: tags/metodos-combinatorios.md
    - file: tags/metodos-numericos.md
    - file: tags/optimizacion.md
    - file: tags/python.md
    - file: contact.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    style: custom.css
    # analytics_google: G-XXXXXXXXXX
    folders: true
  actions:
    - title: RSS
      url: https://opengeos.org/myst-blog-template/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
    footer: |
      [GitHub](https://github.com/SudoerJteheran) |
      [LinkedIn](https://www.linkedin.com/in/juan-manuel-teheran-machado-42b57a265) |
