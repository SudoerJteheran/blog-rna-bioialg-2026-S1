version: 1
project:
  title: Portafolio trabajos de "Redes Neuronales y Algoritmos Bioinspirados" 2026-S1
  description: Un portafolio de trabajos realizados en el curso "Redes Neuronales y Algoritmos Bioinspirados".
  # thumbnail: images/profile-thumbnail.webp
  # authors:
  #   - name: Juan Manuel Teherán Machado
  #     email: jteheranm@unal.edu.co
  #     orcid: 0000-0000-0000-0000
